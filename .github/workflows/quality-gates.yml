name: Quality Gates

on:
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: test -f .memory/EXECUTION_PHASES.md
      - run: test -f docs/architecture/overview.md
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Dead dependency baseline
        run: pnpm deps:dead
        continue-on-error: true
